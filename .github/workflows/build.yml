      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Compilar o APK
        working-directory: ControleTV
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Publicar o APK
        uses: actions/upload-artifact@v4
        with:
          name: ControleTV-apk
          path: ControleTV/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

